<!DOCTYPE html>
<html>
<head>
    <title>Connectify</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Attractive Gradient Background */
            background: linear-gradient(135deg, #667eea, #764ba2);

            color: white;
            text-align: center;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;

            background: white;
            color: #333;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
        }

        .about {
            margin-top: 100px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Connectify</h1>

        <h2>Connect. Chat. Stay safe.</h2>

     
        
    <button onclick="location.href='signup.html'">Sign Up</button>
    <button onclick="location.href='login.html'">Login</button>   
    </div>

    <div class="about">
        <p>Connectify helps users communicate easily with safety and smart features.</p>
    </div>

</body>
</html>
