<!DOCTYPE html>
<html>
<head>
    <title>Login - Connectify</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Gradient Background (same theme as home) */
            background: linear-gradient(to bottom, #190019, #2B124C, #522B5B, #854F6C);
        }

        .login-box {
            background: #FBE4D8;
            padding: 30px;
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #522B5B;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #522B5B;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2B124C;
        }

        .extra {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra a {
            text-decoration: none;
            color: #522B5B;
            font-weight: bold;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login </h2>

    <form action="login.php" method="POST">
        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Password:</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <div class="extra">
        Don't have an account? <a href="signup.html">Sign up</a>
    </div>
</div>

</body>
</html>
