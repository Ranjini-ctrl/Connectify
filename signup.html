<!DOCTYPE html>
<html>
<head>
    <title>Signup - Connectify</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                to bottom,
                #190019,
                #2B124C,
                #522B5B,
                #854F6C
            );
        }

        .signup-box {
            background: #FBE4D8;
            padding: 30px;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            color: #2B124C;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #DFB6B2;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 15px;
            background: #2B124C;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #190019;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #522B5B;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="signup-box">
    <h2>Create Account</h2>

    <form action="signup.php" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <a class="link" href="login.html">Already have an account? Login</a>
</div>

</body>
</html>
